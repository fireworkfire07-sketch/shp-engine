name: Dispatch New Topics

on:
  schedule:
    - cron: "0 6 * * 1,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Sadece logla, gercek dispatch gonderme"
        required: true
        type: boolean
        default: false
      min_score:
        description: "Test icin niche_score esigini gecici düşür (varsayilan 75)"
        required: false
        default: "75"

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Yeni konulari hedef repolara dagit
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          MIN_SCORE: ${{ inputs.min_score }}
        run: python dispatcher.py

      - name: Dispatch log'unu GitHub'a kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/dispatch-log.json
          if git diff --cached --quiet; then
            echo "Yeni dispatch kaydi yok."
          else
            git commit -m "Update dispatch log"
            git push
          fi
