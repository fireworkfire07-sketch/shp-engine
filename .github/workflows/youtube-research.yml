name: SHP YouTube Niche Research

on:
  workflow_dispatch:
    inputs:
      topics:
        description: "Virgülle ayır: Bitkilerin Gizli Tarihi, Sıfırdan Zirveye, Yapay Zeka Haberleri"
        required: true
        default: "Bitkilerin Gizli Tarihi, Sıfırdan Zirveye, Yapay Zeka Haberleri, Psikoloji Hikayeleri, Gizemli Tarih"

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: YouTube nişlerini karşılaştır
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TOPICS: ${{ inputs.topics }}
        run: python batch_research.py "$TOPICS"

      - name: Hikâye DNA puanlarını çıkar
        run: python story_report.py

      - name: Sonuçları kontrol et
        run: |
          test -f projects/batch-ranking.md
          test -f projects/batch-ranking.json
          test -f projects/story-dna.md
          test -f projects/story-dna.json
          cat projects/batch-ranking.md
          cat projects/story-dna.md

      - name: Raporları GitHub'a kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/
          if git diff --cached --quiet; then
            echo "Yeni rapor değişikliği yok."
          else
            git commit -m "Add SHP niche ranking and story DNA report"
            git push
          fi
