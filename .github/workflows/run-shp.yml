name: RUN SHP — YouTube CEO

on:
  workflow_dispatch:
    inputs:
      own_channel:
        description: "Kendi kanalın: URL, @handle veya channel ID"
        required: true
        default: "https://www.youtube.com/@Aslozzy"
      competitors:
        description: "Rakip kanallar, virgülle ayır"
        required: true
        default: "@EvrimAgaci,@BarisOzcan"
      video_url:
        description: "İsteğe bağlı: analiz edilecek tek video URL'si"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run-shp:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: İsteğe bağlı transkript desteğini kur
        if: ${{ inputs.video_url != '' }}
        run: pip install youtube-transcript-api

      - name: Kanalı analiz et
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OWN_CHANNEL: ${{ inputs.own_channel }}
        run: python channel_analyzer.py "$OWN_CHANNEL"

      - name: Rakipleri analiz et
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OWN_CHANNEL: ${{ inputs.own_channel }}
          COMPETITORS: ${{ inputs.competitors }}
        run: python competitor_analyzer.py "$OWN_CHANNEL" "$COMPETITORS"

      - name: PRO niş keşfi ve sıralama
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python niche_intelligence.py

      - name: PRO niş verisini karar motoruna aktar
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          src = Path("projects/niche-intelligence/analysis.json")
          data = json.loads(src.read_text(encoding="utf-8"))
          ranked = []
          for item in data.get("top_10", []):
              ranked.append({
                  "topic": item.get("niche", ""),
                  "niche_score": item.get("final_score", 0),
                  "decision": item.get("decision", ""),
                  "videos_analyzed": item.get("metrics", {}).get("videos_analyzed", 0),
                  "metrics": {
                      "median_views_per_day": item.get("metrics", {}).get("median_views_per_day", 0),
                      "top_views_per_day": item.get("metrics", {}).get("top_views_per_day", 0),
                      "channel_diversity": item.get("metrics", {}).get("channel_diversity", 0),
                  },
                  "gap": item.get("gap", ""),
                  "first_10_video_ideas": item.get("first_10_video_ideas", []),
              })
          Path("projects/batch-ranking.json").write_text(
              json.dumps(ranked, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          lines = [
              "# SHP PRO Niş Sıralaması", "",
              "| # | Niş | Puan | Karar | Günlük medyan |", "|---:|---|---:|---|---:|"
          ]
          for i, item in enumerate(ranked, 1):
              lines.append(
                  f"| {i} | {item['topic']} | {item['niche_score']} | {item['decision']} | "
                  f"{item['metrics']['median_views_per_day']} |"
              )
          Path("projects/batch-ranking.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Hikâye DNA puanlarını çıkar
        run: python story_report.py

      - name: İsteğe bağlı video DNA analizi
        if: ${{ inputs.video_url != '' }}
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VIDEO_URL: ${{ inputs.video_url }}
        run: python video_dna.py "$VIDEO_URL"

      - name: CEO kararını üret
        run: python decision_engine_v2.py

      - name: Emek ve beklenen getiriyi hesapla
        run: python effort_filter.py

      - name: Keşfet ve büyüme planını üret
        run: python growth_advisor.py

      - name: Script Agent V2 — Head Writer AI pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python script_agent_v2.py

      - name: Tüm çıktıları ve CEO kararını doğrula
        run: |
          test -f projects/channel-health/report.md
          test -f projects/channel-health/analysis.json
          test -f projects/competitor-health/report.md
          test -f projects/competitor-health/analysis.json
          test -f projects/niche-intelligence/report.md
          test -f projects/niche-intelligence/analysis.json
          test -f projects/batch-ranking.md
          test -f projects/batch-ranking.json
          test -f projects/story-dna.md
          test -f projects/story-dna.json
          test -f projects/ceo-decision/report.md
          test -f projects/ceo-decision/analysis.json
          test -f projects/growth-advisor/report.md
          test -f projects/growth-advisor/analysis.json
          test -f projects/script-agent/script.md
          test -f projects/script-agent/script.json
          test -f projects/script-agent/storyboard.json
          test -f projects/script-agent/visual_prompts.json
          test -f projects/script-agent/voiceover.txt
          test -f projects/script-agent/subtitle.srt
          test -f projects/script-agent/thumbnail.json
          test -f projects/script-agent/youtube_upload.json
          test -f projects/script-agent/video_engine_handoff.json
          if [ -n "${{ inputs.video_url }}" ]; then
            test -d projects/video-dna
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          niche = json.loads(Path("projects/niche-intelligence/analysis.json").read_text(encoding="utf-8"))
          data = json.loads(Path("projects/ceo-decision/analysis.json").read_text(encoding="utf-8"))
          growth = json.loads(Path("projects/growth-advisor/analysis.json").read_text(encoding="utf-8"))
          script = json.loads(Path("projects/script-agent/script.json").read_text(encoding="utf-8"))
          handoff = json.loads(Path("projects/script-agent/video_engine_handoff.json").read_text(encoding="utf-8"))

          if not niche.get("winner"):
              raise SystemExit("PRO niş motoru kazanan niş üretmedi.")
          if int(niche["winner"].get("final_score", 0)) < 0:
              raise SystemExit("Geçersiz niş puanı.")

          required = [
              "decision", "publish", "topic", "video_idea", "confidence",
              "channel_fit_score", "reasons", "effort_verdict",
              "effort_value_score", "effort_action", "effort_filter",
          ]
          missing = [key for key in required if key not in data]
          if missing:
              raise SystemExit(f"CEO raporunda eksik alanlar: {missing}")

          growth_required = [
              "verdict", "video_idea", "trending_keywords", "first_3_seconds",
              "retention_plan", "engagement_plan", "recommended_publish_time", "hashtags",
          ]
          growth_missing = [key for key in growth_required if key not in growth]
          if growth_missing:
              raise SystemExit(f"Büyüme raporunda eksik alanlar: {growth_missing}")

          blocked = ["yapay zeka", "finans", "kripto", "psikoloji", "minecraft", "roblox", "fortnite"]
          topic = str(data.get("topic", "")).lower()
          if any(word in topic for word in blocked):
              raise SystemExit(f"Kanal dışı konu seçildi: {topic}")
          if int(data.get("channel_fit_score", 0) or 0) < 60:
              raise SystemExit("Kanal uyum puanı 60'ın altında.")
          if not str(data.get("video_idea", "")).strip():
              raise SystemExit("Somut video fikri üretilmedi.")

          verdict = str(data.get("effort_verdict", ""))
          allowed = {"EMEĞİNE DEĞER", "SADECE KÜÇÜK TESTE DEĞER", "EMEĞİNE DEĞMEZ", "DUR — VERİ EKSİK"}
          if verdict not in allowed:
              raise SystemExit(f"Geçersiz emek kararı: {verdict}")
          score = int(data.get("effort_value_score", -1))
          if not 0 <= score <= 100:
              raise SystemExit(f"Geçersiz emek/getiri puanı: {score}")
          if not growth.get("first_3_seconds") or len(growth.get("retention_plan", [])) < 3:
              raise SystemExit("İlk 3 saniye veya retention planı eksik.")

          if script.get("status") not in {"APPROVE", "REJECT"}:
              raise SystemExit(f"Script Agent V2 geçersiz durum döndürdü: {script.get('status')}")
          script_body = script.get("script", {})
          if not script_body.get("title") or not script_body.get("hook"):
              raise SystemExit("Script başlığı veya hook eksik.")
          if len(script_body.get("sections", [])) < 5:
              raise SystemExit("Script bölüm sayısı yetersiz.")
          ceo_review = script.get("ceo_review", {})
          if "ceo_score" not in ceo_review:
              raise SystemExit("CEO Reviewer puanı üretilmedi.")
          if handoff.get("status") not in {"READY_FOR_VIDEO_ENGINE", "NOT_READY"}:
              raise SystemExit("Video Engine handoff geçersiz durumda.")
          # Script Agent V2 kalite kapısı: CEO REJECT ederse build kırılmaz —
          # REJECT + gerekçe, sahte bir ONAY'dan daha değerlidir. Sadece
          # şema/yapı bozuksa build kırılır.

          print("SHP_FINAL_VALIDATION=PASS")
          print(f"NICHE_WINNER={niche['winner']['niche']}")
          print(f"NICHE_SCORE={niche['winner']['final_score']}")
          print(f"DECISION={data['decision']}")
          print(f"VIDEO_IDEA={data['video_idea']}")
          print(f"EFFORT_VERDICT={data['effort_verdict']}")
          print(f"PUBLISH_TIME={growth['recommended_publish_time']}")
          print(f"SCRIPT_STATUS={script['status']}")
          print(f"SCRIPT_CEO_SCORE={ceo_review.get('ceo_score', 0)}")
          print(f"SCRIPT_MODE={script_body.get('source_mode', 'unknown')}")
          PY
          cat projects/niche-intelligence/report.md
          cat projects/ceo-decision/report.md
          cat projects/growth-advisor/report.md
          cat projects/script-agent/script.md

      - name: SHP raporlarını GitHub'a kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/
          if git diff --cached --quiet; then
            echo "Yeni SHP raporu değişikliği yok."
          else
            git commit -m "Run SHP YouTube CEO master workflow"
            git push
          fi
