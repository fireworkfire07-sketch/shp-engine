name: RUN SHP — YouTube CEO

on:
  workflow_dispatch:
    inputs:
      own_channel:
        description: "Kendi kanalın: URL, @handle veya channel ID"
        required: true
        default: "https://www.youtube.com/@Aslozzy"
      competitors:
        description: "Rakip kanallar, virgülle ayır"
        required: true
        default: "@EvrimAgaci,@BarisOzcan"
      video_url:
        description: "İsteğe bağlı: analiz edilecek tek video URL'si"
        required: false
        default: ""
      youtube_upload_mode:
        description: "YouTube yükleme modu — PRIVATE_UPLOAD/PUBLIC_UPLOAD için kimlik bilgisi secret'ları gerekir"
        required: false
        type: choice
        options:
          - DRY_RUN
          - PREPARE_UPLOAD
          - PRIVATE_UPLOAD
          - PUBLIC_UPLOAD
        default: DRY_RUN

permissions:
  contents: write

jobs:
  run-shp:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur (Pillow, espeak-ng)
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends espeak-ng

      - name: Otomatik testleri çalıştır
        run: python -m unittest discover -s tests -t . -v

      - name: Kanalı analiz et
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OWN_CHANNEL: ${{ inputs.own_channel }}
        run: python channel_analyzer.py "$OWN_CHANNEL"

      - name: Rakipleri analiz et
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OWN_CHANNEL: ${{ inputs.own_channel }}
          COMPETITORS: ${{ inputs.competitors }}
        run: python competitor_analyzer.py "$OWN_CHANNEL" "$COMPETITORS"

      - name: PRO niş keşfi ve sıralama
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python niche_intelligence.py

      - name: PRO niş verisini karar motoruna aktar
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          src = Path("projects/niche-intelligence/analysis.json")
          data = json.loads(src.read_text(encoding="utf-8"))
          ranked = []
          for item in data.get("top_10", []):
              ranked.append({
                  "topic": item.get("niche", ""),
                  "niche_score": item.get("final_score", 0),
                  "decision": item.get("decision", ""),
                  "videos_analyzed": item.get("metrics", {}).get("videos_analyzed", 0),
                  "metrics": {
                      "median_views_per_day": item.get("metrics", {}).get("median_views_per_day", 0),
                      "top_views_per_day": item.get("metrics", {}).get("top_views_per_day", 0),
                      "channel_diversity": item.get("metrics", {}).get("channel_diversity", 0),
                  },
                  "gap": item.get("gap", ""),
                  "first_10_video_ideas": item.get("first_10_video_ideas", []),
              })
          Path("projects/batch-ranking.json").write_text(
              json.dumps(ranked, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          lines = [
              "# SHP PRO Niş Sıralaması", "",
              "| # | Niş | Puan | Karar | Günlük medyan |", "|---:|---|---:|---|---:|"
          ]
          for i, item in enumerate(ranked, 1):
              lines.append(
                  f"| {i} | {item['topic']} | {item['niche_score']} | {item['decision']} | "
                  f"{item['metrics']['median_views_per_day']} |"
              )
          Path("projects/batch-ranking.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Hikâye DNA puanlarını çıkar
        run: python story_report.py

      - name: İsteğe bağlı video DNA analizi
        if: ${{ inputs.video_url != '' }}
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VIDEO_URL: ${{ inputs.video_url }}
        run: python video_dna.py "$VIDEO_URL"

      - name: CEO kararını üret
        run: python decision_engine_v2.py

      - name: Emek ve beklenen getiriyi hesapla
        run: python effort_filter.py

      - name: Keşfet ve büyüme planını üret
        run: python growth_advisor.py

      - name: Script Agent V2 — Head Writer AI pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_MODEL intentionally unset: llm.py auto-discovers the
          # newest stable Gemini Flash model from the account's model list.
          # Optional secondary fallbacks if Gemini fails; primary provider is Gemini.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python script_agent_v2.py

      - name: Video CEO Pro incelemesi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_MODEL intentionally unset: llm.py auto-discovers the
          # newest stable Gemini Flash model from the account's model list.
          # Optional secondary fallbacks if Gemini fails; primary provider is Gemini.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python video_ceo.py

      - name: Seslendirme üret (LOCAL_TTS / TEXT_ONLY)
        run: python voiceover_engine.py

      - name: Video Engine — LIGHTWEIGHT_MODE render
        run: python video_engine.py

      - name: YouTube yükleme hazırlığı
        env:
          YOUTUBE_UPLOAD_MODE: ${{ inputs.youtube_upload_mode }}
          YOUTUBE_ALLOW_PUBLIC: ${{ vars.YOUTUBE_ALLOW_PUBLIC }}
          YOUTUBE_OAUTH_ACCESS_TOKEN: ${{ secrets.YOUTUBE_OAUTH_ACCESS_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python youtube_uploader.py

      - name: YouTube yükleme çıktılarını artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-upload-outputs
          path: projects/youtube-upload/
          if-no-files-found: warn

      - name: Learning Engine — bu çalıştırmanın derslerini kaydet
        if: always()
        run: python learning_engine.py

      - name: Learning Engine çıktılarını artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learning-engine-outputs
          path: projects/learning-engine/
          if-no-files-found: warn

      - name: Script Agent V2 çıktılarını artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: script-agent-v2-outputs
          # Video CEO Pro's DÜZELT path rewrites these files in place with
          # the corrected draft, so this step must run after it — otherwise
          # the artifact would capture the pre-correction version.
          path: projects/script-agent/
          if-no-files-found: warn

      - name: Video CEO Pro çıktılarını artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-ceo-outputs
          path: projects/video-ceo/
          if-no-files-found: warn

      - name: Seslendirme çıktılarını artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voiceover-outputs
          path: projects/voiceover/
          if-no-files-found: warn

      - name: Video Engine çıktılarını artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-engine-outputs
          path: projects/video-engine/
          if-no-files-found: warn

      - name: Tüm çıktıları ve CEO kararını doğrula
        run: |
          test -f projects/channel-health/report.md
          test -f projects/channel-health/analysis.json
          test -f projects/competitor-health/report.md
          test -f projects/competitor-health/analysis.json
          test -f projects/niche-intelligence/report.md
          test -f projects/niche-intelligence/analysis.json
          test -f projects/batch-ranking.md
          test -f projects/batch-ranking.json
          test -f projects/story-dna.md
          test -f projects/story-dna.json
          test -f projects/ceo-decision/report.md
          test -f projects/ceo-decision/analysis.json
          test -f projects/growth-advisor/report.md
          test -f projects/growth-advisor/analysis.json
          test -f projects/script-agent/script.md
          test -f projects/script-agent/script.json
          test -f projects/script-agent/storyboard.json
          test -f projects/script-agent/visual_prompts.json
          test -f projects/script-agent/video_prompts.json
          test -f projects/script-agent/voiceover.txt
          test -f projects/script-agent/subtitle.srt
          test -f projects/script-agent/thumbnail.json
          test -f projects/script-agent/youtube_upload.json
          test -f projects/script-agent/video_engine_handoff.json
          test -f projects/video-ceo/report.md
          test -f projects/video-ceo/analysis.json
          test -f projects/voiceover/report.md
          test -f projects/voiceover/audio_manifest.json
          test -f projects/video-engine/report.md
          test -f projects/video-engine/render_manifest.json
          test -f projects/youtube-upload/report.md
          test -f projects/youtube-upload/upload_result.json
          test -f projects/learning-engine/report.md
          test -f projects/learning-engine/memory.json
          if [ -n "${{ inputs.video_url }}" ]; then
            test -d projects/video-dna
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          niche = json.loads(Path("projects/niche-intelligence/analysis.json").read_text(encoding="utf-8"))
          data = json.loads(Path("projects/ceo-decision/analysis.json").read_text(encoding="utf-8"))
          growth = json.loads(Path("projects/growth-advisor/analysis.json").read_text(encoding="utf-8"))
          script = json.loads(Path("projects/script-agent/script.json").read_text(encoding="utf-8"))
          handoff = json.loads(Path("projects/script-agent/video_engine_handoff.json").read_text(encoding="utf-8"))
          video_ceo = json.loads(Path("projects/video-ceo/analysis.json").read_text(encoding="utf-8"))
          voiceover = json.loads(Path("projects/voiceover/audio_manifest.json").read_text(encoding="utf-8"))
          video_engine = json.loads(Path("projects/video-engine/render_manifest.json").read_text(encoding="utf-8"))
          youtube_upload = json.loads(Path("projects/youtube-upload/upload_result.json").read_text(encoding="utf-8"))
          learning = json.loads(Path("projects/learning-engine/memory.json").read_text(encoding="utf-8"))

          if not niche.get("winner"):
              raise SystemExit("PRO niş motoru kazanan niş üretmedi.")
          if int(niche["winner"].get("final_score", 0)) < 0:
              raise SystemExit("Geçersiz niş puanı.")

          required = [
              "decision", "publish", "topic", "video_idea", "confidence",
              "channel_fit_score", "reasons", "effort_verdict",
              "effort_value_score", "effort_action", "effort_filter",
          ]
          missing = [key for key in required if key not in data]
          if missing:
              raise SystemExit(f"CEO raporunda eksik alanlar: {missing}")

          growth_required = [
              "verdict", "video_idea", "trending_keywords", "first_3_seconds",
              "retention_plan", "engagement_plan", "recommended_publish_time", "hashtags",
          ]
          growth_missing = [key for key in growth_required if key not in growth]
          if growth_missing:
              raise SystemExit(f"Büyüme raporunda eksik alanlar: {growth_missing}")

          blocked = ["yapay zeka", "finans", "kripto", "psikoloji", "minecraft", "roblox", "fortnite"]
          topic = str(data.get("topic", "")).lower()
          if any(word in topic for word in blocked):
              raise SystemExit(f"Kanal dışı konu seçildi: {topic}")
          if int(data.get("channel_fit_score", 0) or 0) < 60:
              raise SystemExit("Kanal uyum puanı 60'ın altında.")
          if not str(data.get("video_idea", "")).strip():
              raise SystemExit("Somut video fikri üretilmedi.")

          verdict = str(data.get("effort_verdict", ""))
          allowed = {"EMEĞİNE DEĞER", "SADECE KÜÇÜK TESTE DEĞER", "EMEĞİNE DEĞMEZ", "DUR — VERİ EKSİK"}
          if verdict not in allowed:
              raise SystemExit(f"Geçersiz emek kararı: {verdict}")
          score = int(data.get("effort_value_score", -1))
          if not 0 <= score <= 100:
              raise SystemExit(f"Geçersiz emek/getiri puanı: {score}")
          if not growth.get("first_3_seconds") or len(growth.get("retention_plan", [])) < 3:
              raise SystemExit("İlk 3 saniye veya retention planı eksik.")

          if script.get("status") not in {"APPROVE", "REJECT"}:
              raise SystemExit(f"Script Agent V2 geçersiz durum döndürdü: {script.get('status')}")
          script_body = script.get("script", {})
          if not script_body.get("title") or not script_body.get("hook"):
              raise SystemExit("Script başlığı veya hook eksik.")
          if len(script_body.get("sections", [])) < 5:
              raise SystemExit("Script bölüm sayısı yetersiz.")
          ceo_review = script.get("ceo_review", {})
          if "ceo_score" not in ceo_review:
              raise SystemExit("CEO Reviewer puanı üretilmedi.")
          if handoff.get("status") not in {"READY_FOR_VIDEO_ENGINE", "NOT_READY"}:
              raise SystemExit("Video Engine handoff geçersiz durumda.")

          allowed_video_ceo = {"ÇEK", "DÜZELT", "DUR", "BEKLET — VERİ EKSİK"}
          if video_ceo.get("decision") not in allowed_video_ceo:
              raise SystemExit(f"Video CEO Pro geçersiz karar döndürdü: {video_ceo.get('decision')}")

          allowed_voiceover_modes = {"OPTIONAL_PROVIDER", "LOCAL_TTS", "TEXT_ONLY"}
          if voiceover.get("mode") not in allowed_voiceover_modes:
              raise SystemExit(f"Seslendirme motoru geçersiz mod döndürdü: {voiceover.get('mode')}")

          allowed_video_engine_status = {
              "RENDERED", "STOPPED_BY_VIDEO_CEO", "BLOCKED_MISSING_DATA",
              "RENDER_SKIPPED_NO_FFMPEG", "TECHNICAL_FAILURE",
          }
          if video_engine.get("status") not in allowed_video_engine_status:
              raise SystemExit(f"Video Engine geçersiz durum döndürdü: {video_engine.get('status')}")
          if video_engine.get("status") == "TECHNICAL_FAILURE":
              raise SystemExit(f"Video Engine teknik hata bildirdi: {video_engine.get('reasons')}")
          if video_engine.get("status") == "RENDERED" and not video_engine.get("final_video"):
              raise SystemExit("Video Engine RENDERED bildirdi ama final_video yolu eksik.")

          allowed_upload_status = {
              "DRY_RUN_OK", "DRY_RUN_VALIDATION_FAILED", "PUBLIC_UPLOAD_BLOCKED", "NOT_READY",
              "VALIDATION_FAILED", "PREPARED", "UPLOAD_NOT_CONFIGURED", "UPLOAD_FAILED", "UPLOADED",
          }
          if youtube_upload.get("status") not in allowed_upload_status:
              raise SystemExit(f"YouTube Upload geçersiz durum döndürdü: {youtube_upload.get('status')}")
          upload_privacy = youtube_upload.get("privacy_status")
          if youtube_upload.get("status") == "UPLOADED" and upload_privacy not in {"private", "public"}:
              raise SystemExit(f"YouTube Upload geçersiz gizlilik durumuyla tamamlandı: {upload_privacy}.")
          if youtube_upload.get("status") == "UPLOADED" and upload_privacy == "public" and youtube_upload.get("mode") != "PUBLIC_UPLOAD":
              raise SystemExit(
                  "GÜVENLİK İHLALİ: private olması gereken bir modda public yükleme tamamlandı — "
                  f"mode={youtube_upload.get('mode')}."
              )
          # Script Agent V2 / Video CEO Pro / Video Engine kalite kapısı: CEO
          # REJECT, DÜZELT/DUR/BEKLET veya render'ın güvenli biçimde
          # durdurulması build'i kırmaz — dürüst bir DUR, sahte bir
          # ÇEK/RENDERED'dan daha değerlidir. Sadece şema/yapı bozuksa veya
          # gerçek bir teknik hata varsa build kırılır.

          print("SHP_FINAL_VALIDATION=PASS")
          print(f"NICHE_WINNER={niche['winner']['niche']}")
          print(f"NICHE_SCORE={niche['winner']['final_score']}")
          print(f"DECISION={data['decision']}")
          print(f"VIDEO_IDEA={data['video_idea']}")
          print(f"EFFORT_VERDICT={data['effort_verdict']}")
          print(f"PUBLISH_TIME={growth['recommended_publish_time']}")
          print(f"SCRIPT_STATUS={script['status']}")
          print(f"SCRIPT_CEO_SCORE={ceo_review.get('ceo_score', 0)}")
          print(f"SCRIPT_MODE={script_body.get('source_mode', 'unknown')}")
          print(f"VIDEO_CEO_DECISION={video_ceo.get('decision')}")
          print(f"VIDEO_CEO_SCORE={video_ceo.get('video_ceo_score', 0)}")
          print(f"VIDEO_CEO_REWRITE_USED={video_ceo.get('rewrite_cycle_used', False)}")
          print(f"VOICEOVER_MODE={voiceover.get('mode')}")
          print(f"VIDEO_ENGINE_STATUS={video_engine.get('status')}")
          print(f"VIDEO_ENGINE_OUTPUT={video_engine.get('final_video')}")
          print(f"YOUTUBE_UPLOAD_STATUS={youtube_upload.get('status')}")
          print(f"YOUTUBE_UPLOAD_PRIVACY={youtube_upload.get('privacy_status')}")
          print(f"LEARNING_BEST_CATEGORY={learning.get('lessons', {}).get('best_title_trigger_category')}")
          PY
          cat projects/niche-intelligence/report.md
          cat projects/ceo-decision/report.md
          cat projects/growth-advisor/report.md
          cat projects/script-agent/script.md
          cat projects/video-ceo/report.md
          cat projects/voiceover/report.md
          cat projects/video-engine/report.md
          cat projects/youtube-upload/report.md
          cat projects/learning-engine/report.md

      - name: Final Run Report — bu çalıştırmanın tek gerçek özeti
        if: always()
        run: |
          python final_run.py
          cat projects/final-run/report.md

      - name: Final Run Report'u artifact olarak yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-run-report
          path: projects/final-run/
          if-no-files-found: warn

      - name: SHP raporlarını GitHub'a kaydet
        # always(): önceki bir aşama teknik olarak başarısız olsa bile,
        # o ana kadar üretilen kısmi çıktılar (ve Final Run Report'un
        # TECHNICAL_FAILURE teşhisi) kaybolmadan commit edilir — hangi
        # aşamanın başarısız olduğu git geçmişinde kalıcı olarak görünür.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/
          if git diff --cached --quiet; then
            echo "Yeni SHP raporu değişikliği yok."
          else
            git commit -m "Run SHP YouTube CEO master workflow"
            git push
          fi
